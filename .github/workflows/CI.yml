name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*'] # Triggers release flow on version tags
  pull_request:
    branches: [main]

jobs:
  # JOB 1: Test the code
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest

      - name: Build and install locally for testing
        run: maturin develop

      - name: Run Pytest
        run: pytest tests/test_gslb.py -v

  # JOB 2: Build Production Wheels (ONLY runs if tests pass)
  build_wheels:
    name: Build Wheels
    needs: test # <--- This is the gatekeeper
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: dtolnay/rust-toolchain@stable

      - name: Build release wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          target: ${{ matrix.target }}

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  # JOB 3: Publish Release (ONLY runs on tags, and ONLY if wheels built)
  release:
    name: Create GitHub Release
    needs: build_wheels # <--- Second gatekeeper
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish Release to GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.whl
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}