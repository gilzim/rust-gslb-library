name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']  # Triggers release flow on version tags
  pull_request:
    branches: [main]

jobs:
  # JOB 1: Test the code
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.9", "3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      # Set up Python
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # Explicit Virtualenv Setup and Activation
      - name: Set up and activate virtual environment
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=.venv" >> $GITHUB_ENV
          echo ".venv/bin" >> $GITHUB_PATH
          source .venv/bin/activate

      # Install dependencies inside the virtual environment
      - name: Upgrade pip and install tools
        run: |
          source .venv/bin/activate
          pip install --upgrade pip maturin pytest

      # Build the project inside the virtual environment
      - name: Build and install locally for testing
        run: |
          source .venv/bin/activate
          maturin develop

      # Run tests
      - name: Run Pytest
        run: |
          source .venv/bin/activate
          pytest tests/test_gslb.py -v

  # Other jobs (Build Wheels and Release) stay the same