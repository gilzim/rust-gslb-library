name: CI/CD Pipeline

on:
  push:
    branches:
      - main  # Run on pushes to main
    tags:
      - 'v*'  # Trigger release on version tags
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.10", "3.11"]
    steps:
      # Step 1: Check out the code
      - name: Check out code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      # Step 3: Install dependencies
      - name: Install system and Python dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip maturin pytest

      # Step 4: Run tests
      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest tests/ -v

  build:
    name: Build wheels for ${{ matrix.os }}
    needs: test  # Run only after tests pass
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      # Step 1: Check out the code
      - name: Check out code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install maturin and dependencies
      - name: Install maturin and build dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip maturin

      # Step 4: Build wheels
      - name: Build wheels
        run: |
          source .venv/bin/activate
          maturin build --release --out dist

      # Step 5: Upload wheels as artifacts
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  release:
    name: Release Library
    needs: build  # Run only after build passes
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')  # Run only for tags
    steps:
      # Step 1: Check out the code
      - name: Check out code
        uses: actions/checkout@v4

      # Step 2: Download all built wheels
      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true  # Combine wheels from all platforms

      # Step 3: Create GitHub release
      - name: Publish Release to GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.whl
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}