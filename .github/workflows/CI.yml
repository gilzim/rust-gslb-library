name: CI/CD Pipeline

on:
  push:
    branches:
      - main  # Run on pushes to main
    tags:
      - 'v*'  # Trigger release on version tags
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Test on ${{ matrix.os }} with Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.10", "3.11"]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Install tooling, build wheel & test
        shell: bash
        run: |
          # ensure we're in workspace root
          echo "working directory: $(pwd)" && ls -la
          cd "$GITHUB_WORKSPACE"
          echo "workspace root: $(pwd)" && ls -la
          # choose correct python executable from .venv
          if [ "$RUNNER_OS" = "Windows" ]; then
            venv_python=".venv\\Scripts\\python.exe"
          else
            venv_python=".venv/bin/python"
          fi
          $venv_python -m pip install --upgrade pip
          $venv_python -m pip install maturin pytest
          # build a wheel and install it instead of `develop`
          $venv_python -m maturin build --release --out dist
          $venv_python -m pip install dist/*.whl
          $venv_python -m pytest tests/ -v

  build:
    name: Build wheels for ${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Install tooling & build wheels
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            venv_python=".venv\\Scripts\\python.exe"
          else
            venv_python=".venv/bin/python"
          fi
          $venv_python -m pip install --upgrade pip
          $venv_python -m pip install maturin
          $venv_python -m maturin build --release --out dist

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  release:
    name: Release Library
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish Release to GitHub
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.whl
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}