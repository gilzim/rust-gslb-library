name: CI

on:
  push:
    branches: [main]
    tags: ['v*']            # release when a version tag is pushed
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build & test on ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.9','3.10','3.11']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Build wheel & run tests
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE"                     # ensure we're at repo root
          if [ "$RUNNER_OS" = "Windows" ]; then
            venv_py=".venv\\Scripts\\python.exe"
          else
            venv_py=".venv/bin/python"
          fi
          $venv_py -m pip install --upgrade pip
          $venv_py -m pip install maturin pytest
          $venv_py -m maturin build --release --out dist
          $venv_py -m pip install dist/*.whl
          $venv_py -m pytest tests/ -v

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          # include python version to make each matrix entry unique
          name: wheels-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl

  release:
    name: Publish release
    needs: build-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download built wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.whl
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}